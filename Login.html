<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>
        body {
            background-color: cornsilk;
        }
        input {
            padding:10px;
        }
    </style>
</head>
<body>
    <div style="text-align:center;margin-top:5%">
        <image style="width:10%" src="SeekLogo.png"></image>
        <div style="font-weight:bold;font-size:80px;font-family:Georgia">S E E K</div>
    </div>
    <div style="text-align:center;padding-top:30px">
        <form action="Start" method="post">
            <input style="font-size:x-large" type="text" placeholder="Username" name="username"><br/>
            <input style="font-size:x-large" type="password" placeholder="Password" name="password"><br/>
            <input type="submit" value="Log in" style="background-color:black;color:white;margin-top:10px;font-size:x-large;min-width:100px;width:10%;border-radius:20px;">
        </form>
        <div style="padding-top:20px">
            Don't have an account? <a href="CreateAccount">Create Account</a>
        </div>
    </div>
</body>
</html>
