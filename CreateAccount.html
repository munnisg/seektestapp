<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            background-color: cornsilk;
        }
        label {
            font-size:x-large;
        }
        input {
            margin-top:20px;
            margin-bottom:20px;
        }
    </style>
</head>
<body>
    <div style="text-align:center;margin-top:10%;font-weight:bold;font-size:60px;font-family:Georgia">Account Details</div>
    <div style="text-align:center;padding-top:30px">
        <form action="Account" method="post">
            <label for="username">Enter your username: </label>
            <input id="username" style="font-size:x-large" type="text" name="username"><br/>
            <label for="password">Enter your password: </label>
            <input id="password" style="font-size:x-large" type="password" name="password"><br/>
            <label for="password2">Re-enter your password: </label>
            <input id="password2" style="font-size:x-large" type="password" name="password2"><br/>
            <input type="submit" value="Submit" style="background-color:black;color:white;font-size:x-large;min-width:100px;width:10%;border-radius:20px;">
        </form>
    </div>
</body>
</html>
